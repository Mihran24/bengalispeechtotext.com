<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Speech to Text</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Bengali Speech to Text</h1>
        <p class="subtitle">Click "Record" to start and "Stop Recording" when you are done.</p>
        
        <textarea id="text-output" placeholder="Your spoken Bengali text will appear here..." readonly></textarea>
        
        <div class="button-group">
            <button id="record-btn" class="btn btn-record">
                <span class="icon">🎤</span> Record
            </button>
            <button id="stop-btn" class="btn btn-stop" disabled>
                <span class="icon">⏹</span> Stop Recording
            </button>
        </div>
        
        <div id="status" class="status-message">Ready</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
